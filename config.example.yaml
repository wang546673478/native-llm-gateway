# Native LLM Gateway — config 示例
# 完整规格见 Native LLM Gateway — 完整实现规格书 v2.md 第 4.1 节

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 120s       # 流式响应需要较长写超时
  idle_timeout: 120s
  shutdown_timeout: 30s

database:
  driver: "sqlite"          # sqlite | postgres
  dsn: "data/gateway.db"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300s

redis:
  enabled: false            # 单实例 P0 阶段不需要,集群/P1+ 启用
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10

# 客户端认证(P7 阶段真正生效)
auth:
  enabled: false            # P0 阶段先关掉,免得请求被 401 挡掉
  keys:
    - name: "dev-key"
      key: "gw-key-dev-please-change-me"
      allowed_models: ["*"]
      rate_limit:
        rpm: 100
        tpm: 500000

# Provider 配置
# 每个 Provider 默认 endpoint 和模型列表参考各 vendor 官方文档(2026-07)
# Provider 的 API key 不在这里配置(全部由 DB 管理,见下)

# Provider API Key 全部由 DB(provider_api_keys 表)管理
# 通过前端 Provider Keys 页面 / REST API 添加/删除
# 这里不再保留 keys: 字段(避免误导和重复)
providers:
  # --- DeepSeek (OpenAI 兼容,端点 /chat/completions 不带 /v1) ---
  # 文档:https://api-docs.deepseek.com/zh-cn/
  # 价格文档:https://api-docs.deepseek.com/zh-cn/quick_start/pricing
  # 上下文:1M tokens,最大输出 384K tokens
  # 注意:deepseek-chat / deepseek-reasoner 将于 2026-07-24 23:59(北京时间)弃用,
  # 分别映射到 v4-flash 的非 thinking / thinking 模式
  deepseek:
    enabled: true
    endpoint: "https://api.deepseek.com"
    protocol: "openai"
    timeout: 60s
    models:
      # v4-flash:¥1/M 输入、¥0.02/M cache 命中、¥2/M 输出
      - id: "deepseek-v4-flash"
        aliases: ["coding-model", "chat-model"]
        cost_per_1k_input: 0.001
        cost_per_1k_output: 0.002
        cost_per_1k_cache_read: 0.00002
        cost_per_1k_cache_creation: 0.0
      # v4-pro:¥3/M 输入、¥0.025/M cache 命中、¥6/M 输出,支持 thinking 模式
      - id: "deepseek-v4-pro"
        aliases: ["pro-model"]
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.006
        cost_per_1k_cache_read: 0.000025
        cost_per_1k_cache_creation: 0.0
    # P41 DeepSeek 支持的 API 特性(都通过 body 透传,Gateway 不需特殊处理):
    #   - Thinking 模式:extra_body={"thinking":{"type":"enabled"}}(v4-pro)
    #   - Tool use / function calling:OpenAI 标准 tools 数组
    #   - JSON mode:response_format={"type":"json_object"}
    #   - Prefix caching:默认开启,响应 prompt_cache_hit_tokens / prompt_cache_miss_tokens
    #   - Streaming:stream=true,SSE 格式
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- DeepSeek Anthropic 兼容(给 Anthropic SDK 用户) ---
  # 文档:https://api-docs.deepseek.com/zh-cn/ (Anthropic 协议部分)
  deepseek-anthropic:
    enabled: true
    endpoint: "https://api.deepseek.com/anthropic"
    protocol: "anthropic"
    timeout: 90s
    models:
      - id: "deepseek-v4-flash"
        aliases: []
        cost_per_1k_input: 0.001
        cost_per_1k_output: 0.002
        cost_per_1k_cache_read: 0.00002
        cost_per_1k_cache_creation: 0.0
      - id: "deepseek-v4-pro"
        aliases: []
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.006
        cost_per_1k_cache_read: 0.000025
        cost_per_1k_cache_creation: 0.0
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- 智谱 GLM (OpenAI 兼容) ---
  # 文档:https://open.bigmodel.cn/dev/api
  glm:
    enabled: true
    endpoint: "https://open.bigmodel.cn/api/paas/v4"
    protocol: "openai"
    timeout: 60s
    models:
      - id: "glm-4-flash"          # 免费,稳定,默认推荐
        aliases: ["glm-flash"]
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
      - id: "glm-4.7-flash"        # 2026-01 最新免费(替代 glm-4.5-flash)
        aliases: []
        cost_per_1k_input: 0.0
        cost_per_1k_output: 0.0
      - id: "glm-4-air"            # 轻量
        aliases: []
        cost_per_1k_input: 0.0072
        cost_per_1k_output: 0.0072
      - id: "glm-4-long"           # 长上下文
        aliases: []
        cost_per_1k_input: 0.0072
        cost_per_1k_output: 0.0072
      - id: "glm-4-plus"           # 高级
        aliases: []
        cost_per_1k_input: 0.36
        cost_per_1k_output: 0.36
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- 通义千问 Qwen (OpenAI 兼容模式,DashScope) ---
  # 文档:https://help.aliyun.com/zh/model-studio/completions
  # 端点:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  qwen:
    enabled: true
    endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    protocol: "openai"
    timeout: 60s
    models:
      - id: "qwen-plus"             # 商用主力
        aliases: []
        cost_per_1k_input: 0.0058
        cost_per_1k_output: 0.0144
      - id: "qwen-turbo"            # 更快更便宜
        aliases: []
        cost_per_1k_input: 0.00216
        cost_per_1k_output: 0.0043
      - id: "qwen-max"              # 旗舰
        aliases: []
        cost_per_1k_input: 0.144
        cost_per_1k_output: 0.432
      - id: "qwen-coder-plus"       # 代码
        aliases: ["qwen-coder"]
        cost_per_1k_input: 0.0252
        cost_per_1k_output: 0.0504
      - id: "qwen-long"             # 长上下文(1M tokens)
        aliases: []
        cost_per_1k_input: 0.0036
        cost_per_1k_output: 0.0144
      - id: "qwen-vl-max"           # 多模态视觉
        aliases: []
        cost_per_1k_input: 0.0216
        cost_per_1k_output: 0.0648
      - id: "qwen3-235b-a22b"       # Qwen3 旗舰 MoE
        aliases: []
        cost_per_1k_input: 0.0288
        cost_per_1k_output: 0.0864
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- Kimi (Moonshot,OpenAI 兼容) ---
  # 文档:https://platform.kimi.ai/docs/models
  # 端点:https://api.moonshot.cn/v1/chat/completions
  # 注意:moonshot-v1-* 已不对新用户开放;kimi-k2-0905-preview / kimi-latest 已弃用
  kimi:
    enabled: true
    endpoint: "https://api.moonshot.cn"
    protocol: "openai"
    timeout: 120s
    models:
      - id: "kimi-k3"               # 当前最新
        aliases: []
        cost_per_1k_input: 0.0864
        cost_per_1k_output: 0.0864
      - id: "kimi-k2.7-code"        # 代码专用
        aliases: []
        cost_per_1k_input: 0.108
        cost_per_1k_output: 0.108
      - id: "kimi-k2.7-code-highspeed"  # 代码高速
        aliases: []
        cost_per_1k_input: 0.036
        cost_per_1k_output: 0.036
      - id: "kimi-k2.6"
        aliases: []
        cost_per_1k_input: 0.0864
        cost_per_1k_output: 0.0864
      - id: "kimi-k2.5"
        aliases: []
        cost_per_1k_input: 0.0864
        cost_per_1k_output: 0.0864
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- MiniMax (稀宇科技,Anthropic 兼容) ---
  # 文档:https://platform.minimaxi.com/docs/api-reference/api-overview
  # Anthropic 兼容端点(推荐):POST https://api.minimaxi.com/anthropic/v1/messages
  # 鉴权:Authorization: Bearer <API_KEY>
  # 额外 header:anthropic-version(由 anthropic_compatible.Base 自动加)
  # M3 专属参数:thinking / reasoning_split / service_tier 通过 extra_body 传
  minimax:
    enabled: true
    endpoint: "https://api.minimaxi.com/anthropic"
    protocol: "anthropic"
    timeout: 90s
    models:
      - id: "MiniMax-M3"              # 1M tokens,旗舰
        aliases: ["MiniMax"]
        cost_per_1k_input: 0.0072
        cost_per_1k_output: 0.0576
      - id: "MiniMax-M2.7"            # 204,800
        aliases: []
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.04
      - id: "MiniMax-M2.7-highspeed"  # 204,800,更快
        aliases: []
        cost_per_1k_input: 0.00216
        cost_per_1k_output: 0.0166
      - id: "MiniMax-M2.5"            # 204,800
        aliases: []
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.04
      - id: "MiniMax-M2.5-highspeed"
        aliases: []
        cost_per_1k_input: 0.00216
        cost_per_1k_output: 0.0166
      - id: "MiniMax-M2.1"            # 204,800 早期稳定
        aliases: []
        cost_per_1k_input: 0.0072
        cost_per_1k_output: 0.0576
      - id: "MiniMax-M2.1-highspeed"
        aliases: []
        cost_per_1k_input: 0.00288
        cost_per_1k_output: 0.0216
      - id: "MiniMax-M2"              # 204,800 基础
        aliases: []
        cost_per_1k_input: 0.0072
        cost_per_1k_output: 0.0576
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- Google Gemini (Google 协议) ---
  # 文档:https://ai.google.dev/gemini-api/docs/models
  # 端点:POST {endpoint}/models/{model}:generateContent
  # 鉴权:x-goog-api-key header
  # Body:{contents:[{parts:[{text:"..."}], role:"user"}]}
  # Usage 字段名:promptTokenCount / candidatesTokenCount / totalTokenCount
  # 注意:gemini-2.0-flash / gemini-1.5-pro 已 shut down / deprecated
  gemini:
    enabled: true
    endpoint: "https://generativelanguage.googleapis.com/v1beta"
    protocol: "google"
    timeout: 60s
    models:
      - id: "gemini-2.5-flash"           # stable 推荐
        aliases: ["gemini-flash"]
        cost_per_1k_input: 0.00054
        cost_per_1k_output: 0.00216
      - id: "gemini-2.5-flash-lite"      # stable 便宜
        aliases: []
        cost_per_1k_input: 0.00027
        cost_per_1k_output: 0.00108
      - id: "gemini-2.5-pro"             # stable 强
        aliases: ["gemini-pro"]
        cost_per_1k_input: 0.009
        cost_per_1k_output: 0.036
      - id: "gemini-3.5-flash"           # stable 新
        aliases: []
        cost_per_1k_input: 0.00072
        cost_per_1k_output: 0.00288
      - id: "gemini-3.1-flash-lite"      # stable
        aliases: []
        cost_per_1k_input: 0.00018
        cost_per_1k_output: 0.00072
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

# 路由规则(P4 阶段真正生效)
routing:
  # P39: 共享 provider chain — 定义一次,多个 alias 用 chain_ref 复用
  # 加新 fallback 时只改这里,引用它的 alias 自动生效
  chains:
    claude:
      - name: "minimax"
        model: "MiniMax-M3"
        priority: 1
      - name: "deepseek-anthropic"   # P50: 用 Anthropic 协议的 deepseek,匹配 Claude Code 的 /v1/messages
        model: "deepseek-v4-flash"
        priority: 2
      - name: "glm"
        model: "glm-4-flash"
        priority: 3
  aliases:
    coding-model:
      strategy: "priority"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-flash"
          priority: 1
        - name: "qwen"
          model: "qwen-coder-plus"
          priority: 2
        - name: "kimi"
          model: "kimi-k2-0905-preview"
          priority: 3
        - name: "glm"
          model: "glm-4-flash"
          priority: 4
    pro-model:
      strategy: "priority"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-pro"
          priority: 1
        - name: "minimax"
          model: "claude-sonnet-4-5"
          priority: 2
        - name: "qwen"
          model: "qwen-max"
          priority: 3
    chat-model:
      strategy: "weight"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-flash"
          weight: 40
        - name: "qwen"
          model: "qwen-plus"
          weight: 30
        - name: "glm"
          model: "glm-4-flash"
          weight: 20
        - name: "gemini"
          model: "gemini-2.0-flash"
          weight: 10
    # P38 + P39: Claude Code 模型 — Anthropic SDK 默认会发这些 model id
    # chain_ref 引用上面的 chains.claude,实现 minimax→deepseek→glm 自动 failover
    claude-sonnet-4-5:
      strategy: "priority"
      chain_ref: "claude"
    claude-sonnet-5:
      strategy: "priority"
      chain_ref: "claude"
    claude-opus-4-8:
      strategy: "priority"
      chain_ref: "claude"
  default_strategy: "priority"

# Key Pool 配置(P3 阶段真正生效)
keypool:
  cooling_duration: 60s
  max_cooling_count: 5
  health_check_interval: 30s
  key_rotation: "round_robin"

# 超时与重试(P5 阶段真正生效)
timeouts:
  server_read: 30s
  server_write: 120s
  server_idle: 120s
  provider_default: 60s
  request_total: 300s

retry:
  enabled: true
  max_attempts: 3
  no_failover_on:
    - "invalid_request"
    - "auth"
  failover_on:
    - "rate_limit"
    - "server_error"
    - "timeout"
    - "connection"

# 日志
logging:
  level: "info"
  format: "console"         # P0 阶段用 console 方便看;生产改 json
  output: "stdout"
  file_path: "logs/gateway.log"

# 指标(P8 阶段真正生效)
metrics:
  enabled: false
  path: "/metrics"
  port: 9090

# Usage(P8 阶段真正生效)
usage:
  flush_interval: 10s
  batch_size: 100
  retention_days: 90
