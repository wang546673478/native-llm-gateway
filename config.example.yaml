# Native LLM Gateway — config 示例
# 完整规格见 Native LLM Gateway — 完整实现规格书 v2.md 第 4.1 节

server:
  host: "0.0.0.0"
  port: 8080
  read_timeout: 30s
  write_timeout: 120s       # 流式响应需要较长写超时
  idle_timeout: 120s
  shutdown_timeout: 30s

database:
  driver: "sqlite"          # sqlite | postgres
  dsn: "data/gateway.db"
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 300s

redis:
  enabled: false            # 单实例 P0 阶段不需要,集群/P1+ 启用
  addr: "localhost:6379"
  password: ""
  db: 0
  pool_size: 10

# 客户端认证(P7 阶段真正生效)
auth:
  enabled: false            # P0 阶段先关掉,免得请求被 401 挡掉
  keys:
    - name: "dev-key"
      key: "gw-key-dev-please-change-me"
      allowed_models: ["*"]
      rate_limit:
        rpm: 100
        tpm: 500000

# Provider 配置
# 7 个 Provider 都启用,key 用占位符 sk-REPLACE-ME / xxx.REPLACE-ME,部署前替换
# 每个 Provider 默认 endpoint 和模型列表参考各 vendor 官方文档(2026-07)
providers:
  # --- DeepSeek (OpenAI 兼容,端点 /chat/completions 不带 /v1) ---
  # 文档:https://api-docs.deepseek.com/zh-cn/
  deepseek:
    enabled: true
    endpoint: "https://api.deepseek.com"
    protocol: "openai"
    timeout: 60s
    models:
      - id: "deepseek-v4-flash"
        aliases: ["coding-model", "chat-model"]
        cost_per_1k_input: 0.0001
        cost_per_1k_output: 0.0004
      - id: "deepseek-v4-pro"
        aliases: ["pro-model"]
        cost_per_1k_input: 0.002
        cost_per_1k_output: 0.008
    keys:
      - name: "deepseek-key-1"
        key: "sk-REPLACE-ME"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- DeepSeek Anthropic 兼容(给 Anthropic SDK 用户) ---
  # 文档:https://api-docs.deepseek.com/zh-cn/ (Anthropic 协议部分)
  deepseek-anthropic:
    enabled: true
    endpoint: "https://api.deepseek.com/anthropic"
    protocol: "anthropic"
    timeout: 90s
    models:
      - id: "deepseek-v4-flash"
        aliases: []
        cost_per_1k_input: 0.0001
        cost_per_1k_output: 0.0004
    keys:
      - name: "deepseek-anthropic-key-1"
        key: "sk-REPLACE-ME"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- 智谱 GLM (OpenAI 兼容) ---
  # 文档:https://open.bigmodel.cn/dev/api
  glm:
    enabled: true
    endpoint: "https://open.bigmodel.cn/api/paas/v4"
    protocol: "openai"
    timeout: 60s
    models:
      - id: "glm-4-flash"
        aliases: ["glm-flash"]
        cost_per_1k_input: 0.0     # glm-4-flash 免费
        cost_per_1k_output: 0.0
      - id: "glm-4.6"
        aliases: []
        cost_per_1k_input: 0.001
        cost_per_1k_output: 0.001
      - id: "glm-4"
        aliases: []
        cost_per_1k_input: 0.1      # 标准价,实际看官方
        cost_per_1k_output: 0.1
    keys:
      - name: "glm-key-1"
        key: "REPLACE-ME.glm-key"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- 通义千问 Qwen (OpenAI 兼容模式,DashScope) ---
  # 文档:https://help.aliyun.com/zh/model-studio/developer-reference/use-qwen-by-calling-api
  # 端点:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
  qwen:
    enabled: true
    endpoint: "https://dashscope.aliyuncs.com/compatible-mode/v1"
    protocol: "openai"
    timeout: 60s
    models:
      - id: "qwen-plus"
        aliases: []
        cost_per_1k_input: 0.0008
        cost_per_1k_output: 0.002
      - id: "qwen-turbo"
        aliases: []
        cost_per_1k_input: 0.0003
        cost_per_1k_output: 0.0006
      - id: "qwen-max"
        aliases: []
        cost_per_1k_input: 0.02
        cost_per_1k_output: 0.06
      - id: "qwen-coder-plus"
        aliases: ["qwen-coder"]
        cost_per_1k_input: 0.0035
        cost_per_1k_output: 0.007
      - id: "qwen-long"
        aliases: []
        cost_per_1k_input: 0.0005
        cost_per_1k_output: 0.002
    keys:
      - name: "qwen-key-1"
        key: "sk-REPLACE-ME"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- Kimi (Moonshot,OpenAI 兼容) ---
  # 文档:https://platform.moonshot.cn/docs/intro
  # 端点:https://api.moonshot.cn/v1/chat/completions
  kimi:
    enabled: true
    endpoint: "https://api.moonshot.cn"
    protocol: "openai"
    timeout: 120s   # 长上下文模型需要更长超时
    models:
      - id: "moonshot-v1-8k"
        aliases: []
        cost_per_1k_input: 0.012   # 官方定价,实际以控制台为准
        cost_per_1k_output: 0.012
      - id: "moonshot-v1-32k"
        aliases: []
        cost_per_1k_input: 0.024
        cost_per_1k_output: 0.024
      - id: "moonshot-v1-128k"
        aliases: ["kimi-long"]
        cost_per_1k_input: 0.06
        cost_per_1k_output: 0.06
      - id: "kimi-k2-0905-preview"
        aliases: []
        cost_per_1k_input: 0.005
        cost_per_1k_output: 0.005
    keys:
      - name: "kimi-key-1"
        key: "sk-REPLACE-ME"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- MiniMax / Anthropic 兼容 ---
  # 规格书里的占位名,实际指向任何 Anthropic Messages 兼容端点:
  #   - Anthropic Claude API (https://api.anthropic.com)
  #   - 其他走 Anthropic 协议的 vendor
  # 鉴权:x-api-key header + anthropic-version: 2023-06-01
  # 端点:POST /v1/messages
  # 文档:https://docs.anthropic.com/en/api/messages
  minimax:
    enabled: true
    endpoint: "https://api.anthropic.com"
    protocol: "anthropic"
    timeout: 90s
    models:
      - id: "claude-sonnet-4-5"
        aliases: ["sonnet"]
        cost_per_1k_input: 0.003
        cost_per_1k_output: 0.015
      - id: "claude-3-5-haiku-20241022"
        aliases: ["haiku"]
        cost_per_1k_input: 0.0008
        cost_per_1k_output: 0.004
      - id: "claude-3-opus-20240229"
        aliases: ["opus"]
        cost_per_1k_input: 0.015
        cost_per_1k_output: 0.075
    keys:
      - name: "minimax-key-1"
        key: "sk-ant-REPLACE-ME"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

  # --- Google Gemini (Google 协议) ---
  # 文档:https://ai.google.dev/gemini-api/docs
  # 端点:POST {endpoint}/models/{model}:generateContent
  # 鉴权:x-goog-api-key header(不是 ?key= query)
  # Body:{contents:[{parts:[{text:"..."}], role:"user"}]}
  # Usage 字段名:promptTokenCount / candidatesTokenCount / totalTokenCount
  gemini:
    enabled: true
    endpoint: "https://generativelanguage.googleapis.com/v1beta"
    protocol: "google"
    timeout: 60s
    models:
      - id: "gemini-2.0-flash"
        aliases: ["gemini-flash"]
        cost_per_1k_input: 0.000075    # 2026 公开价
        cost_per_1k_output: 0.0003
      - id: "gemini-2.0-flash-lite"
        aliases: []
        cost_per_1k_input: 0.0000375
        cost_per_1k_output: 0.00015
      - id: "gemini-1.5-pro"
        aliases: []
        cost_per_1k_input: 0.00125
        cost_per_1k_output: 0.005
      - id: "gemini-3.5-flash"
        aliases: []
        cost_per_1k_input: 0.0001
        cost_per_1k_output: 0.0004
    keys:
      - name: "gemini-key-1"
        key: "REPLACE-ME.gemini-key"
    circuit_breaker:
      failure_threshold: 5
      failure_window: 60s
      open_timeout: 30s
      half_open_requests: 1
      countable_errors: ["5xx", "timeout", "connection_error"]
      excluded_errors: ["429"]

# 路由规则(P4 阶段真正生效)
routing:
  aliases:
    coding-model:
      strategy: "priority"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-flash"
          priority: 1
        - name: "qwen"
          model: "qwen-coder-plus"
          priority: 2
        - name: "kimi"
          model: "kimi-k2-0905-preview"
          priority: 3
        - name: "glm"
          model: "glm-4-flash"
          priority: 4
    pro-model:
      strategy: "priority"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-pro"
          priority: 1
        - name: "minimax"
          model: "claude-sonnet-4-5"
          priority: 2
        - name: "qwen"
          model: "qwen-max"
          priority: 3
    chat-model:
      strategy: "weight"
      providers:
        - name: "deepseek"
          model: "deepseek-v4-flash"
          weight: 40
        - name: "qwen"
          model: "qwen-plus"
          weight: 30
        - name: "glm"
          model: "glm-4-flash"
          weight: 20
        - name: "gemini"
          model: "gemini-2.0-flash"
          weight: 10
  default_strategy: "priority"

# Key Pool 配置(P3 阶段真正生效)
keypool:
  cooling_duration: 60s
  max_cooling_count: 5
  health_check_interval: 30s
  key_rotation: "round_robin"

# 超时与重试(P5 阶段真正生效)
timeouts:
  server_read: 30s
  server_write: 120s
  server_idle: 120s
  provider_default: 60s
  request_total: 300s

retry:
  enabled: true
  max_attempts: 3
  no_failover_on:
    - "invalid_request"
    - "auth"
  failover_on:
    - "rate_limit"
    - "server_error"
    - "timeout"
    - "connection"

# 日志
logging:
  level: "info"
  format: "console"         # P0 阶段用 console 方便看;生产改 json
  output: "stdout"
  file_path: "logs/gateway.log"

# 指标(P8 阶段真正生效)
metrics:
  enabled: false
  path: "/metrics"
  port: 9090

# Usage(P8 阶段真正生效)
usage:
  flush_interval: 10s
  batch_size: 100
  retention_days: 90
